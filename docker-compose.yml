services:
  ingest:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      CHROMA_URL: http://chromadb:8000
    depends_on:
      - chromadb
    command: npm run ingest
    volumes:
      - ./backend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      CHROMA_URL: http://chromadb:8000
    depends_on:
      ingest:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - /app/node_modules

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE

volumes:
  chroma_data:
    driver: local
